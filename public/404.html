<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sharvani Lekkala</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Store the full intended URL in sessionStorage, then redirect to root.
      // The index.html script will pick this up and restore history state.
      sessionStorage.redirect = location.href;
      window.location.href =
        location.protocol + '//' + location.hostname +
        (location.port ? ':' + location.port : '') +
        '/Sharvani-Portfolio/';
    </script>
  </head>
  <body></body>
</html>
